name: first-workflow

on:
  push:

jobs:
  learn:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: db
          POSTGRES_USER: root
          POSTGRES_PASSWORD: toor
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test
        working-directory: backend
        env:
          DB_HOST: postgres
          DB_NAME: db
          DB_USER: root
          DB_PASSWORD: toor
        run: python -m pytest -v
